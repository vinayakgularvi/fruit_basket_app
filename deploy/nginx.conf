server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA shell — must always be revalidated so new deploys are picked up.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Flutter entrypoints keep the same URLs on every build. Long immutable
  # caching (see old config) caused browsers to run stale JS forever on custom
  # domains while a fresh Cloud Run URL looked "correct".
  location ~* ^/(main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json)$ {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
  }

  # Content-hashed outputs under assets/ — safe to cache long-term.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location /canvaskit/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Icons, manifest, fonts — moderate cache (not immutable forever).
  location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff2?|json|css)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }
}
